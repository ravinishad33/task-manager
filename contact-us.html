<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-100 min-h-screen p-6 md:p-12">

    <div class="max-w-2xl mx-auto">
        <nav class="glass mb-12 rounded-2xl shadow-sm">
            <div class="px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2 font-bold text-slate-800">
                    <i data-lucide="layout-list" class="text-blue-600"></i> TaskNexus
                </div>
                <div class="flex gap-6">
                    <a href="index.html" class="text-slate-500 hover:text-blue-600 font-medium transition">App</a>
                    <a href="about.html" class="text-slate-500 hover:text-blue-600 font-medium transition">About</a>
                    <a href="contact-us.html" class="text-blue-600 font-bold border-b-2 border-blue-600">Contact</a>
                </div>
            </div>
        </nav>

        <div class="glass p-8 rounded-3xl shadow-xl shadow-blue-900/5">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Get in Touch</h1>
            <p class="text-slate-500 mb-8 font-medium">Have a feature request or found a bug? Let us know!</p>

            <form id="contactForm" onsubmit="handleContact(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                    <input type="text" required placeholder="Ravi Ramesh Nishad"
                        class="w-full bg-white/50 border border-slate-200 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                    <input type="email" required placeholder="ravi@example.com"
                        class="w-full bg-white/50 border border-slate-200 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Message</label>
                    <textarea required rows="4" placeholder="How can we help you?"
                        class="w-full bg-white/50 border border-slate-200 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"></textarea>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i> Send Message
                </button>
            </form>
        </div>

        <div class="mt-10 flex flex-col items-center gap-4">
            <p class="text-slate-400 text-sm font-semibold uppercase tracking-widest">Or find us on</p>
            <div class="flex gap-4">
                <a href="#" class="glass p-3 rounded-full text-slate-600 hover:text-blue-600 transition-colors"><i data-lucide="github"></i></a>
                <a href="#" class="glass p-3 rounded-full text-slate-600 hover:text-blue-400 transition-colors"><i data-lucide="twitter"></i></a>
                <a href="#" class="glass p-3 rounded-full text-slate-600 hover:text-pink-600 transition-colors"><i data-lucide="instagram"></i></a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function handleContact(event) {
            event.preventDefault();
            alert("Thanks for reaching out! Since this is a frontend demo, no data was sent. In a real app, we would connect this to a backend.");
            event.target.reset();
        }
    </script>
</body>
</html>
