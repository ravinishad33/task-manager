<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - TaskNexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .hidden-form { display: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 font-bold hover:text-blue-700 transition">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to App
            </a>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl shadow-blue-900/10">
            <div class="flex bg-slate-100 p-1 rounded-xl mb-8">
                <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-2 rounded-lg font-bold transition-all bg-white shadow-sm text-blue-600">Login</button>
                <button id="registerTab" onclick="switchTab('register')" class="flex-1 py-2 rounded-lg font-bold transition-all text-slate-500 hover:text-slate-700">Register</button>
            </div>

            <form id="loginForm" onsubmit="handleAuth(event, 'Login')" class="space-y-5">
                <h2 class="text-2xl font-bold text-slate-800">Welcome Back</h2>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                    <input type="email" required placeholder="ravi@example.com" class="w-full bg-white border border-slate-200 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                    <input type="password" required placeholder="••••••••" class="w-full bg-white border border-slate-200 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">Sign In</button>
            </form>

            <form id="registerForm" onsubmit="handleAuth(event, 'Registration')" class="space-y-5 hidden-form">
                <h2 class="text-2xl font-bold text-slate-800">Create Account</h2>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                    <input type="text" required placeholder="Ravi Ramesh Nishad" class="w-full bg-white border border-slate-200 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                    <input type="email" required placeholder="ravi@example.com" class="w-full bg-white border border-slate-200 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                    <input type="password" required placeholder="Create a password" class="w-full bg-white border border-slate-200 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">Create Account</button>
            </form>

            <p class="text-center text-slate-400 text-xs mt-8">
                By continuing, you agree to our Terms of Service.
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function switchTab(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');

            if (type === 'login') {
                loginForm.classList.remove('hidden-form');
                registerForm.classList.add('hidden-form');
                loginTab.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
                loginTab.classList.remove('text-slate-500');
                registerTab.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
                registerTab.classList.add('text-slate-500');
            } else {
                loginForm.classList.add('hidden-form');
                registerForm.classList.remove('hidden-form');
                registerTab.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
                registerTab.classList.remove('text-slate-500');
                loginTab.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
                loginTab.classList.add('text-slate-500');
            }
        }

        function handleAuth(event, type) {
            event.preventDefault();
            alert(`${type} successful! Redirtecting to dashboard...`);
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
